<!DOCTYPE html>
<html lang="en-PH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Saan Tayo Kakain — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1208;
      color: #f5f0e8;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: clamp(48px, 15vw, 80px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 0.9;
      margin-bottom: 16px;
    }
    p {
      font-size: 14px;
      color: #7c6d5a;
      max-width: 280px;
      line-height: 1.5;
    }
    .brand { color: #a03837; }
  </style>
</head>
<body>
  <h1>You're<br /><span class="brand">offline.</span></h1>
  <p>Check your connection and try again. We need your location to find places near you.</p>
</body>
</html>
